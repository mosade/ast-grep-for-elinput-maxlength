id: add-missing-maxlength-pascal-paired
valid:
  - <ElInput v-model="form.username" maxlength="20"></ElInput>
  - <ElInput v-model="form.booleanAttr" maxlength></ElInput>
  - <ElInput v-model="form.email" :maxlength="maxEmailLength"></ElInput>
  - <ElInput v-model="form.emailShorthand" :maxlength></ElInput>
  - <ElInput v-model="form.alias" v-bind:maxlength="maxAliasLength"></ElInput>
  - <ElInput v-model="form.aliasShorthand" v-bind:maxlength></ElInput>
  - <ElInput v-model="form.aliasProp" :maxlength.prop="maxAliasLength"></ElInput>
  - <ElInput v-model="form.aliasCamel" v-bind:maxlength.camel="maxAliasLength"></ElInput>
  - '<ElInput v-model="form.profile" v-bind="{ maxlength: 10 }"></ElInput>'
  - '<ElInput v-model="form.profile" v-bind="{ ''maxlength'': 10 }"></ElInput>'
  - "<ElInput v-model=\"form.profile\" v-bind='{ maxlength: 10 }'></ElInput>"
  - '<ElInput v-model="form.profile" v-bind="{ maxlength }"></ElInput>'
  - '<ElInput v-model="form.profile" v-bind="{ maxLength: 10 }"></ElInput>'
  - "<ElInput v-model=\"form.profile\" v-bind='{ \"maxLength\": 10 }'></ElInput>"
  - "<ElInput v-model=\"form.profile\" v-bind='{ maxLength: 10 }'></ElInput>"
  - "<ElInput v-model=\"form.profile\" v-bind='{ \"maxlength\": 10 }'></ElInput>"
  - '<ElInput v-model="form.profile" v-bind="{ ''maxLength'': 10 }"></ElInput>'
  - '<ElInput v-model="form.profile" v-bind="{ maxLength }"></ElInput>'
  - |
    <ElInput v-model="form.note" maxlength="50">
      <span>child</span>
    </ElInput>
invalid:
  - <ElInput v-model="form.address"></ElInput>
  - |
    <ElInput
      v-model="form.phone"
      clearable
      placeholder="PascalCase 非 self-close 且不含 maxlength"
    ></ElInput>
  - |
    <ElInput v-model="form.note">
      <span>child</span>
    </ElInput>
  - '<ElInput v-model="form.profile" v-bind="{ foo: 1 }"></ElInput>'
  - '<ElInput v-model="form.profile" v-bind="{ maxLengthFoo: 1 }"></ElInput>'

id: add-missing-maxlength-pascal-paired
language: html
message: ElInput is missing maxlength
severity: warning
rule:
  all:
    - pattern: <ElInput $$$ATTRS>$$$CHILDREN</ElInput>
    - not:
        matches: has-maxlength-attr
    - not:
        matches: has-maxlength-in-bind-object
    - not:
        any:
          - pattern: <ElInput $$$BEFORE maxlength $$$AFTER>$$$CHILDREN</ElInput>
          - pattern: <ElInput $$$BEFORE maxlength=$VALUE $$$AFTER>$$$CHILDREN</ElInput>
          - pattern: <ElInput $$$BEFORE :maxlength $$$AFTER>$$$CHILDREN</ElInput>
          - pattern: <ElInput $$$BEFORE :maxlength=$VALUE $$$AFTER>$$$CHILDREN</ElInput>
          - pattern: <ElInput $$$BEFORE v-bind:maxlength $$$AFTER>$$$CHILDREN</ElInput>
          - pattern: <ElInput $$$BEFORE v-bind:maxlength=$VALUE $$$AFTER>$$$CHILDREN</ElInput>
fix: <ElInput $$$ATTRS maxlength="20">$$$CHILDREN</ElInput>
